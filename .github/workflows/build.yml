name: Build LSPosed Module APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      run: |
        # Install Android SDK
        sudo mkdir -p /opt/android-sdk/cmdline-tools
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        sudo mv cmdline-tools /opt/android-sdk/latest
        sudo chown -R runner:runner /opt/android-sdk/
        
        export ANDROID_HOME=/opt/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/bin:$ANDROID_HOME/platform-tools
        
        # Create the required directory structure
        mkdir -p /opt/android-sdk/cmdline-tools/latest
        mv /opt/android-sdk/latest/* /opt/android-sdk/cmdline-tools/latest/
        
        # Accept licenses
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # Install required packages
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "platform-tools" \
          "build-tools;34.0.0" \
          "platforms;android-34"
        
        echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
        echo "/opt/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "/opt/android-sdk/platform-tools" >> $GITHUB_PATH
        
    - name: Create dummy keystore for debug build
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        mkdir -p ~/.gradle
        echo "android.debug.keystore=${PWD}/debug.keystore" > ~/.gradle/gradle.properties

    - name: Make setup script executable and run it
      run: |
        chmod +x scripts/setup_project.sh
        ./scripts/setup_project.sh

    - name: Build APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: libtool-injector-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn