name: Build LSPosed Module APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        packages: tools platform-tools build-tools-34.0.0 platforms-android-34
        
    - name: Create dummy keystore for debug build
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        mkdir -p ~/.gradle
        echo "android.debug.keystore=${PWD}/debug.keystore" > ~/.gradle/gradle.properties

    - name: Create project structure
      run: |
        mkdir -p app/src/main/java/me/miku/libtool/hook
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout

    - name: Create Java files
      run: |
        # Copy existing Java files if they exist
        if [ -d "src/main/java/me/miku/libtool/hook/" ]; then
          cp -r src/main/java/me/miku/libtool/hook/* app/src/main/java/me/miku/libtool/hook/ 2>/dev/null || echo "No Java files to copy"
        fi
        # Ensure we have the main hook file
        if [ ! -f "app/src/main/java/me/miku/libtool/hook/MainHook.java" ]; then
          echo "Creating default MainHook.java"
          cat > app/src/main/java/me/miku/libtool/hook/MainHook.java << 'EOF_JAVA'
package me.miku.libtool.hook;

import android.util.Log;
import de.robv.android.xposed.IXposedHookLoadPackage;
import de.robv.android.xposed.XC_MethodHook;
import de.robv.android.xposed.XposedHelpers;
import de.robv.android.xposed.callbacks.XC_LoadPackage;

public class MainHook implements IXposedHookLoadPackage {
    private static final String TAG = "LibTool-Injector";
    
    @Override
    public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable {
        if (!lpparam.packageName.equals("com.superplanet.evilhunter")) {
            return;
        }
        
        Log.d(TAG, "Hooking into target app: " + lpparam.packageName);
        
        XposedHelpers.findAndHookMethod("android.app.Application", lpparam.classLoader, 
            "onCreate", new XC_MethodHook() {
                @Override
                protected void afterHookedMethod(XC_MethodHook.MethodHookParam param) throws Throwable {
                    Log.d(TAG, "Application onCreate called, injection logic would go here");
                }
            });
    }
}
EOF_JAVA
        fi

    - name: Create AndroidManifest.xml
      run: |
        cat > app/src/main/AndroidManifest.xml << 'EOF_MANIFEST'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="me.miku.libtool.injector">

    <application
        android:label="LibTool Injector"
        android:icon="@mipmap/ic_launcher">
        
        <activity
            android:name="androidx.appcompat.app.AppCompatActivity"
            android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
        
        <meta-data
            android:name="xposedmodule"
            android:value="true" />
            
        <meta-data
            android:name="xposeddescription"
            android:value="Inject libTool.so into target game" />
            
        <meta-data
            android:name="xposedminversion"
            android:value="93" />
            
        <meta-data
            android:name="xposedscope"
            android:value="com.superplanet.evilhunter" />
    </application>
</manifest>
EOF_MANIFEST

    - name: Create build files
      run: |
        # Create app-level build.gradle
        cat > app/build.gradle << 'EOF_GRADLE'
apply plugin: 'com.android.application'

android {
    compileSdk 34

    defaultConfig {
        applicationId "me.miku.libtool.injector"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        debug {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    compileOnly 'de.robv.android.xposed:api:82'
}
EOF_GRADLE

        # Create root build.gradle
        cat > build.gradle << 'EOF_ROOT'
plugins {
    id 'com.android.application' version '7.4.2' apply false
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
EOF_ROOT

        # Create gradle.properties
        cat > gradle.properties << 'EOF_PROP'
// Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
EOF_PROP

        # Create settings.gradle
        cat > settings.gradle << 'EOF_SETTINGS'
pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "LibTool Injector"
include ':app'
EOF_SETTINGS

        # Create basic res files
        mkdir -p app/src/main/res/values
        cat > app/src/main/res/values/strings.xml << 'EOF_STRINGS'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">LibTool Injector</string>
</resources>
EOF_STRINGS

    - name: Build APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: libtool-injector-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn